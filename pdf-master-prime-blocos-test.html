    .toolbar button { background:#2D3F5E; color:#fff; border:none; padding:8px 14px; font-size:13px; font-weight:600; border-radius:5px; cursor:pointer; }

<body>

  // ───── 6. ALAVANCAGEM PATRIMONIAL (cards múltiplos + tabela) ─────
  CENARIOS.push({
    tituloEstrategia: 'Alavancagem Patrimonial',
    filename: 'master-prime-alavanc',
    blocos: [
      { tipo:'card', titulo:'DADOS DA COTA', linhas:[

  //  RENDERIZA CADA CENÁRIO INLINE (preview)
  // ──────────────────────────────────────────────────────────────────────
  const lista = document.getElementById('lista');
  CENARIOS.forEach((c, i) => {
    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex; flex-direction:column; align-items:center; gap:12px;';
    wrap.innerHTML = `
      <div class="scenario-label">Cenário ${i+1}/7 · ${c.tituloEstrategia}</div>
      <div class="scenario-card">${PdfMasterPrime.buildTemplate(c)}</div>`;
    lista.appendChild(wrap);

  // ──────────────────────────────────────────────────────────────────────
  //  GERA OS 7 PDFs SEQUENCIALMENTE
  // ──────────────────────────────────────────────────────────────────────
  async function baixarTodos() {
    for (const c of CENARIOS) {
      await PdfMasterPrime.gerar(c);
      await new Promise(r => setTimeout(r, 600));
    }

</body>
</html>
